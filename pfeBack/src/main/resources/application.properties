spring.application.name=pfeBack

# Server Configuration
server.port=8080
# Pour Spring Boot 2.x
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ProjetDB?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mustapha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=yourSecretKeyWithAtLeast32CharactersLongForHS256
jwt.expiration=86400000
